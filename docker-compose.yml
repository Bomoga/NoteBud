version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: notebud-db
    environment:
      POSTGRES_USER: notebud
      POSTGRES_PASSWORD: W1$wfRxi?u7wdshU]STjL*+[?6@C6XS$mbv
      POSTGRES_DB: notebud_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebud -d notebud_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: